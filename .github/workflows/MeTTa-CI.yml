name: metta-run CI

on:
  push:
    branches: [ref/mettalog]
  pull_request:
    branches: [ref/mettalog]

jobs:
  mettalog-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true    # <-- Initialize submodules on checkout

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'   # <-- Changed to 3.10 for compatibility

    - name: Install Python Dependencies from metta-wam requirements
      run: |
        set -e
        cd metta-wam
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install SWI-Prolog from PPA
      run: |
        set -e
        sudo apt-get remove -y swi-prolog swi-prolog-core swi-prolog-nox swi-prolog-x || true
        sudo apt-get update
        sudo apt-add-repository ppa:swi-prolog/stable -y
        sudo apt-get update
        sudo apt-get install -y swi-prolog

    - name: Install MeTTaLog
      run: |
        set -e
        cd metta-wam
        chmod +x ./INSTALL.sh
        source ./INSTALL.sh --allow-system-modifications

    - name: Run MeTTaLog Tests
      env:
        SWIPL_BOOT_FLAGS: "--no-pce"
      run: |
        cd metta-wam
        mettalog --test examples/tests/unit_test_example.metta
        mettalog --test tests/baseline_compat/metta-morph_tests/tests0.metta
